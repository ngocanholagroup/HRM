<div class="login-container">
  
  <!-- Hình nền trang trí -->
  <div class="decor-circle circle-1"></div>
  <div class="decor-circle circle-2"></div>

  <!-- Form Login -->
  <div class="form_login">
    
    <!-- Logo & Title -->
    <div class="welcome-box">
      <img src="assets/logo.png" alt="ManaPlastic Logo" class="logo">
      <h1 class="brand-name">Hola Group</h1>
    </div>

    <!-- Alert Message -->
    <div class="box_response" *ngIf="message">
      <div class="alert" 
           [class.alert-success]="isSuccess" 
           [class.alert-error]="!isSuccess">
        <span class="material-symbols-outlined icon">
          {{ isSuccess ? 'check_circle' : 'error' }}
        </span>
        <span>{{ message }}</span>
      </div>
    </div>

    <div class="form_login_body">
      
      <!-- Username -->
      <div class="input-group">
        <label>Tên đăng nhập</label>
        <input
          type="text"
          [(ngModel)]="username"
          placeholder="Nhập username của bạn"
          (keyup.enter)="login()"
        />
      </div>

      <!-- Password -->
      <div class="input-group">
        <label>Mật khẩu</label>
        <input
          type="password"
          [(ngModel)]="password"
          placeholder="Nhập mật khẩu"
          (keyup.enter)="login()"
        />
      </div>

      <!-- Forgot Password -->
      <div class="actions">
        <span class="forgot-password" (click)="forgotPassword()">
          Quên mật khẩu?
        </span>
      </div>

      <!-- Button -->
      <button class="login_button" (click)="login()">
        <span>Đăng Nhập</span>
        <span class="material-symbols-outlined arrow">arrow_forward</span>
      </button>

    </div>
  </div>
</div>

<app-loading *ngIf="isloading"></app-loading>
