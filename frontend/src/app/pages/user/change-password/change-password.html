<div class="modal-overlay" *ngIf="isOpen" (click)="closeModal($event)">
  
  <div class="modal-container" (click)="preventClose($event)">
    
    <div class="modal-header">
      <div class="header-content">
        <div class="icon-bg">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6c5ce7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
        </div>
        <div>
          <h3>Đổi mật khẩu</h3>
          <p>Cập nhật mật khẩu mới</p>
        </div>
      </div>
      <button class="btn-close" (click)="closeModal($event)">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>

    <div class="modal-body">
      
      <div class="input-group">
        <label>Mật khẩu hiện tại</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          </span>
          <input type="password" [(ngModel)]="oldPassword" placeholder="Nhập mật khẩu cũ..." />
        </div>
      </div>

      <div class="input-group">
        <label>Mật khẩu mới</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          </span>
          <input type="password" [(ngModel)]="newPassword" placeholder="Nhập mật khẩu mới..." />
        </div>
      </div>

      <div class="input-group">
        <label>Xác nhận mật khẩu</label>
        <div class="input-wrapper">
          <span class="input-icon">
             <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
          </span>
          <input 
            type="password" 
            [(ngModel)]="renewPassword" 
            [class.error-border]="renewPassword && newPassword && renewPassword !== newPassword"
            placeholder="Nhập lại mật khẩu mới..." 
          />
        </div>
        <span class="error-text" *ngIf="renewPassword && newPassword && renewPassword !== newPassword">
          Mật khẩu xác nhận không khớp
        </span>
      </div>

    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="closeModal($event)">Hủy</button>
      <button class="btn-confirm" (click)="savePassword()" [disabled]="isLoading">
        Lưu thay đổi
      </button>
    </div>
  </div>
</div>

<app-loading *ngIf="isLoading"></app-loading>

<app-alert
  *ngIf="isAlert"
  [message]="alertMessage"
  [notifyType]="alertType"
  (hidden)="isAlert = false"
></app-alert>
