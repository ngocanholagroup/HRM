<!-- SỬA LẠI: Dùng toán tử 3 ngôi để gán class 'success' hoặc 'error' -->
<div class="notify-container" [ngClass]="notifyType ? 'success' : 'error'">
  
  <!-- Icon Success (Hiện khi notifyType = true) -->
  <div class="icon-box" *ngIf="notifyType">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
      <polyline points="22 4 12 14.01 9 11.01"></polyline>
    </svg>
  </div>

  <!-- Icon Error (Hiện khi notifyType = false) -->
  <div class="icon-box" *ngIf="!notifyType">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="8" x2="12" y2="12"></line>
      <line x1="12" y1="16" x2="12.01" y2="16"></line>
    </svg>
  </div>

  <div class="content">
    <p class="message">{{ message }}</p>
  </div>

  <button class="close-btn" (click)="onClose()">
    &times; 
  </button>
</div>
